<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customer Registration</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f3f4f6;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.register-wrapper{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.register-card{
    width:100%;
    max-width:650px;
    background:#ffffff;
    border-radius:28px;
    padding:40px;
    box-shadow:0 10px 35px rgba(0,0,0,0.08);
    border:1px solid #e5e7eb;
}

.register-title{
    font-size:38px;
    font-weight:700;
    color:#1f2937;
    margin-bottom:10px;
    text-align:center;
}

.register-subtitle{
    text-align:center;
    color:#6b7280;
    margin-bottom:35px;
    font-size:15px;
    line-height:1.6;
}

.form-group{
    margin-bottom:22px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#374151;
}

.form-group input{
    width:100%;
    height:58px;
    border:2px solid #d1d5db;
    border-radius:16px;
    padding:0 18px;
    font-size:15px;
    outline:none;
    background:#f9fafb;
    transition:0.3s;
}

.form-group input:focus{
    border-color:#2d5a43;
    background:white;
}

.continue-btn{
    width:100%;
    height:62px;
    background:#2d5a43;
    color:white;
    border:none;
    border-radius:18px;
    margin-top:20px;
    font-size:20px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.continue-btn:hover{
    background:#1f4332;
}


/* MOBILE */

@media(max-width:768px){

    .register-card{
        padding:25px;
    }

    .register-title{
        font-size:30px;
    }

}

</style>

</head>

<body>

<div class="register-wrapper">

    <div class="register-card">

        <div class="register-title">
            Customer Registration
        </div>

        <div class="register-subtitle">
            Fill your details to continue your dining experience
        </div>

        <!-- FULL NAME -->

        <div class="form-group">

            <label>Full Name</label>

            <input 
            type="text" 
            id="fullName"
            placeholder="Enter your full name">

        </div>

        <!-- PHONE -->

        <div class="form-group">

            <label>Phone Number</label>

            <input 
            type="text" 
            id="phoneNumber"
            placeholder="+91 9876543210">

        </div>

        <!-- EMAIL -->

        <div class="form-group">

            <label>Email Address</label>

            <input 
            type="email" 
            id="emailAddress"
            placeholder="example@gmail.com">

        </div>

        <!-- BUTTON -->

        <button 
        class="continue-btn"
        onclick="registerCustomer()">

            Register & Continue →

        </button>

    </div>

</div>



<script>

function registerCustomer()
{

    let name =
    document.getElementById("fullName").value;

    let phone =
    document.getElementById("phoneNumber").value;

    let email =
    document.getElementById("emailAddress").value;


    // VALIDATION

    if(name.trim() === "")
    {
        alert("Please enter your full name");
        return;
    }

    if(phone.trim() === "")
    {
        alert("Please enter your phone number");
        return;
    }

    if(email.trim() === "")
    {
        alert("Please enter your email address");
        return;
    }


    // CREATE CUSTOMER OBJECT

    let customerData = {

        name:name,

        phone:phone,

        email:email

    };


    // SAVE COMPLETE OBJECT

    sessionStorage.setItem(
        "customerData",
        JSON.stringify(customerData)
    );


    // GO TO MENU PAGE

    window.location.href =
    "Restaurant_Menu.html";

}

</script>
</body>
</html>
