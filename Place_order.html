<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order Summary</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f7fb;
    color:#333;
    padding-bottom:120px;
}

.header{
    background:#005cb8;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    max-width:1200px;
    margin:20px auto;
    padding:20px;
    display:flex;
    gap:20px;
}

.left{
    flex:2;
}

.right{
    flex:1;
}

.card{
    background:white;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.item{
    display:flex;
    align-items:center;
    gap:15px;
}

.item img{
    width:100px;
    height:100px;
    border-radius:10px;
    object-fit:cover;
}

.item-details{
    flex:1;
}

.item-details h3{
    margin-bottom:5px;
}

.item-details p{
    color:#666;
    margin-bottom:5px;
}

.price{
    color:#005cb8;
    font-size:20px;
    font-weight:bold;
}

.qty{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:10px;
}

.qty button{
    width:30px;
    height:30px;
    border:none;
    background:#005cb8;
    color:white;
    border-radius:50%;
    cursor:pointer;
    font-size:18px;
}

.bill h2{
    margin-bottom:15px;
}

.bill-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.total{
    font-size:24px;
    font-weight:bold;
    color:#005cb8;
    margin-top:15px;
}

.place-order{
    width:100%;
    margin-top:20px;
    padding:15px;
    border:none;
    background:#005cb8;
    color:white;
    font-size:18px;
    font-weight:bold;
    border-radius:8px;
    cursor:pointer;
}

.place-order:hover{
    background:#004a94;
}

/* PAYMENT */

.payment-section{
    margin-top:20px;
    margin-bottom:20px;
}

.payment-section h3{
    margin-bottom:15px;
    font-size:18px;
}

.payment-option{
    display:flex;
    align-items:center;
    gap:10px;
    padding:15px;
    margin-bottom:10px;
    background:#f5f7fb;
    border:1px solid #ddd;
    border-radius:8px;
    cursor:pointer;
}

.payment-option:hover{
    background:#eef5ff;
    border-color:#005cb8;
}

.payment-option input{
    width:18px;
    height:18px;
}

/* ORDER TYPE */

.order-type-options{
    display:flex;
    gap:15px;
}

.order-option{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:15px;
    background:#f5f7fb;
    border:1px solid #ddd;
    border-radius:8px;
    cursor:pointer;
}

.order-option:hover{
    background:#eef5ff;
    border-color:#005cb8;
}

.order-option input{
    width:18px;
    height:18px;
}

/* FOOTER */

.footer{
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    border-top:1px solid #ddd;
    display:flex;
    justify-content:space-around;
    align-items:center;
    padding:15px;
    z-index:100;
}

.footer a{
    text-decoration:none;
    color:#333;
    font-weight:bold;
}

/* ADDON BUTTON */

.addon-btn{
    background:#005cb8;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    font-weight:bold;
}

.addon-btn:hover{
    background:#004a94;
}

/* ADDON MENU */

.addon-menu{
    display:none;
    position:fixed;
    bottom:85px;
    left:50%;
    transform:translateX(-50%);
    width:320px;
    background:white;
    border-radius:14px;
    box-shadow:0 6px 20px rgba(0,0,0,0.2);
    padding:15px;
    z-index:1000;
}

.addon-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 0;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

.addon-item:hover{
    color:#005cb8;
}

.addon-item:last-child{
    border-bottom:none;
}

/* EMPTY CART MESSAGE */

.empty-msg{
    text-align:center;
    color:#999;
    font-size:18px;
    padding:40px;
}

@media(max-width:768px){

.container{
    flex-direction:column;
}

.addon-menu{
    width:90%;
}

.footer{
    font-size:14px;
}

}

</style>

</head>

<body>

<div class="header">
    <h1>ZOHO KIOSK</h1>
</div>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left" id="cartItems"></div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <div class="card bill">

            <h2>Bill Details</h2>

            <div class="bill-row">
                <span>Item Total</span>
                <span class="item-total">₹0</span>
            </div>

            <div class="bill-row">
                <span>GST (5%)</span>
                <span class="gst">₹0</span>
            </div>

            <div class="bill-row">
                <span>Service Fee</span>
                <span class="service-fee">₹0</span>
            </div>

            <hr><br>

            <div class="bill-row total">
                <span>Total</span>
                <span class="grand-total">₹0</span>
            </div>

            <!-- ORDER TYPE -->
            <div class="order-type-section">
                <h3>Order Type</h3><br>
                <div class="order-type-options">
                    <label class="order-option">
                        <input type="radio" name="order_type" checked>
                        <span>🍽️ Dine In</span>
                    </label>
                    <label class="order-option">
                        <input type="radio" name="order_type">
                        <span>🥡 Take Away</span>
                    </label>
                </div>
            </div>

            <!-- PAYMENT -->
            <div class="payment-section">
                <h3>Select Payment Method</h3>
                <label class="payment-option">
                    <input type="radio" name="payment" checked>
                    <span>💵 Cash</span>
                </label>
                <label class="payment-option">
                    <input type="radio" name="payment">
                    <span>📱 UPI</span>
                </label>
            </div>

            <button class="place-order" onclick="placeOrder()">
                PLACE ORDER
            </button>

        </div>

    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    <a href="Restaurant_menu.html">⬅ Back</a>
    <button class="addon-btn" onclick="toggleAddonMenu()">➕ Add On</button>
    <a href="#">❓ Help</a>
</div>

<!-- ADDON MENU -->
<div class="addon-menu" id="addonMenu">
    <div class="addon-item" onclick="addAddon('🧀 Extra Cheese',40)"><span>🧀 Extra Cheese</span><span>₹40</span></div>
    <div class="addon-item" onclick="addAddon('🍚 Extra Rice',60)"><span>🍚 Extra Rice</span><span>₹60</span></div>
    <div class="addon-item" onclick="addAddon('🫓 Extra Roti',25)"><span>🫓 Extra Roti</span><span>₹25</span></div>
    <div class="addon-item" onclick="addAddon('🥗 Green Salad',80)"><span>🥗 Green Salad</span><span>₹80</span></div>
    <div class="addon-item" onclick="addAddon('🍟 French Fries',120)"><span>🍟 French Fries</span><span>₹120</span></div>
    <div class="addon-item" onclick="addAddon('🥤 Soft Drink',90)"><span>🥤 Soft Drink</span><span>₹90</span></div>
    <div class="addon-item" onclick="addAddon('🧈 Butter Topping',35)"><span>🧈 Butter Topping</span><span>₹35</span></div>
    <div class="addon-item" onclick="addAddon('🌶️ Extra Spicy Masala',20)"><span>🌶️ Extra Spicy Masala</span><span>₹20</span></div>
</div>

<script>

// ✅ LOAD CART FROM SESSION STORAGE

let cart =
JSON.parse(sessionStorage.getItem("restaurantCart")) || [];

let cartContainer =
document.getElementById("cartItems");

// ✅ RENDER ALL CART ITEMS ON LOAD

function renderCart()
{
    cartContainer.innerHTML = "";

    if(cart.length === 0)
    {
        cartContainer.innerHTML =
        `<div class="empty-msg">🛒 Your cart is empty.<br>Go back and add items.</div>`;
        updateTotals();
        return;
    }

    cart.forEach(item =>
    {
        let numericPrice =
        parseInt(item.price.toString().replace("₹",""));

        cartContainer.innerHTML += `
        <div class="card item" data-name="${item.name}">
            ${item.image ? `<img src="${item.image}">` : ""}
            <div class="item-details">
                <h3>${item.name}</h3>
                <p>${item.description || ""}</p>
                <div class="price">₹${numericPrice}</div>
                <div class="qty">
                    <button onclick="decreaseQty(this)">-</button>
                    <span>${item.quantity}</span>
                    <button onclick="increaseQty(this)">+</button>
                </div>
            </div>
        </div>`;
    });

    updateTotals();
}

renderCart();

// ✅ INCREASE QTY — also updates sessionStorage

function increaseQty(button)
{
    let card = button.closest(".card.item");
    let name = card.getAttribute("data-name");

    let qtySpan =
    button.parentElement.querySelector("span");

    let qty = parseInt(qtySpan.innerText);
    qty++;
    qtySpan.innerText = qty;

    // UPDATE sessionStorage
    cart.forEach(item => {
        if(item.name === name) item.quantity = qty;
    });

    sessionStorage.setItem("restaurantCart", JSON.stringify(cart));
    updateTotals();
}

// ✅ DECREASE QTY — removes card AND sessionStorage entry when qty hits 0

function decreaseQty(button)
{
    let card = button.closest(".card.item");
    let name = card.getAttribute("data-name");

    let qtySpan =
    button.parentElement.querySelector("span");

    let qty = parseInt(qtySpan.innerText);

    if(qty > 1)
    {
        // JUST REDUCE
        qty--;
        qtySpan.innerText = qty;

        cart.forEach(item => {
            if(item.name === name) item.quantity = qty;
        });
    }
    else
    {
        // ✅ QTY HIT 0 — REMOVE FROM SCREEN AND CART
        card.remove();

        cart = cart.filter(item => item.name !== name);

        if(cart.length === 0)
        {
            cartContainer.innerHTML =
            `<div class="empty-msg">🛒 Your cart is empty.<br>Go back and add items.</div>`;
        }
    }

    // ✅ SYNC BACK TO sessionStorage so menu pages reflect the change
    sessionStorage.setItem("restaurantCart", JSON.stringify(cart));
    updateTotals();
}

// ✅ UPDATE BILL TOTALS

function updateTotals()
{
    let itemCards =
    document.querySelectorAll(".card.item");

    let itemTotal = 0;

    itemCards.forEach(card => {

        let price =
        parseInt(
            card.querySelector(".price")
            .innerText.replace("₹","")
        );

        let qty =
        parseInt(
            card.querySelector(".qty span")
            .innerText
        );

        itemTotal += price * qty;
    });

    let gst = Math.round(itemTotal * 0.05);
    let serviceFee = itemTotal > 0 ? 25 : 0;
    let grandTotal = itemTotal + gst + serviceFee;

    document.querySelector(".item-total").innerText = "₹" + itemTotal;
    document.querySelector(".gst").innerText = "₹" + gst;
    document.querySelector(".service-fee").innerText = "₹" + serviceFee;
    document.querySelector(".grand-total").innerText = "₹" + grandTotal;
}

// ✅ TOGGLE ADDON MENU

function toggleAddonMenu()
{
    let menu = document.getElementById("addonMenu");
    menu.style.display =
    (menu.style.display === "block") ? "none" : "block";
}

// ✅ ADD ADDON TO CART

function addAddon(name, price)
{
    // Check if addon already exists
    let existing = cart.find(item => item.name === name);

    if(existing)
    {
        existing.quantity++;
        sessionStorage.setItem("restaurantCart", JSON.stringify(cart));
        renderCart();
    }
    else
    {
        cart.push({
            name: name,
            price: "₹" + price,
            image: "",
            description: "Addon Item",
            quantity: 1
        });

        sessionStorage.setItem("restaurantCart", JSON.stringify(cart));
        renderCart();
    }

    document.getElementById("addonMenu").style.display = "none";
}

// ✅ PLACE ORDER

function placeOrder()
{
    let customerData =
    JSON.parse(sessionStorage.getItem("customerData")) || {};

    let itemCards =
    document.querySelectorAll(".card.item");

    let items = [];
    let itemTotal = 0;

    itemCards.forEach(card => {

        let name = card.querySelector(".item-details h3").innerText;
        let price = parseInt(card.querySelector(".price").innerText.replace("₹",""));
        let qty = parseInt(card.querySelector(".qty span").innerText);

        if(qty > 0)
        {
            items.push({ name, price, qty });
            itemTotal += price * qty;
        }
    });

    let gst = Math.round(itemTotal * 0.05);
    let serviceFee = itemTotal > 0 ? 25 : 0;
    let grandTotal = itemTotal + gst + serviceFee;

    // GET PAYMENT METHOD
    let paymentRadios =
    document.querySelectorAll('input[name="payment"]');
    let paymentLabels = ["💵 Cash", "📱 UPI"];
    let paymentMethod = "💵 Cash";
    paymentRadios.forEach((radio, index) => {
        if(radio.checked) paymentMethod = paymentLabels[index];
    });

    // GET ORDER TYPE
    let orderRadios =
    document.querySelectorAll('input[name="order_type"]');
    let orderLabels = ["🍽️ Dine In", "🥡 Take Away"];
    let orderType = "🍽️ Dine In";
    orderRadios.forEach((radio, index) => {
        if(radio.checked) orderType = orderLabels[index];
    });

    let orderId = "ORD-" + Date.now();

    let orderData = {
        customerName  : customerData.name  || "Walk-in Customer",
        customerPhone : customerData.phone || "N/A",
        customerEmail : customerData.email || "N/A",
        orderId       : orderId,
        orderDate     : new Date().toLocaleString(),
        items         : items,
        itemTotal     : "₹" + itemTotal,
        gst           : "₹" + gst,
        serviceFee    : "₹" + serviceFee,
        grandTotal    : "₹" + grandTotal,
        paymentMethod : paymentMethod,
        orderType     : orderType
    };

    sessionStorage.setItem("latestOrder", JSON.stringify(orderData));

    // ✅ CLEAR CART after placing order
    sessionStorage.removeItem("restaurantCart");

    window.location.href = "conformation.html";
}

</script>

</body>
</html>
